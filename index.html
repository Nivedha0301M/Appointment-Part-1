    const quizDiv = document.getElementById("quiz");

    questions.forEach((question,index)=>{

        const qDiv = document.createElement("div");

        qDiv.classList.add("question");

        qDiv.id = `question_${index}`;

        qDiv.innerHTML = `
        <h3>Q${index+1}. ${question.q}</h3>
        `;

        question.options.forEach((option,optIndex)=>{

            const opt = document.createElement("div");

            opt.classList.add("option");

            opt.innerText = option;

            opt.onclick = ()=>selectOption(index,optIndex,opt);

            opt.id = `q${index}_opt${optIndex}`;

            qDiv.appendChild(opt);

        });

        // MARK BUTTON

        const markBtn = document.createElement("button");

        markBtn.innerText = "Mark For Review";

        markBtn.classList.add("mark-btn");

        markBtn.onclick = ()=>toggleMark(index,markBtn);

        qDiv.appendChild(markBtn);

        // CLEAR BUTTON

        const clearBtn = document.createElement("button");

        clearBtn.innerText = "Clear";

        clearBtn.classList.add("clear-btn");

        clearBtn.onclick = ()=>clearAnswer(index);

        qDiv.appendChild(clearBtn);

        quizDiv.appendChild(qDiv);

    });

}

// ===============================
// SELECT OPTION
// ===============================

function selectOption(qIndex,optIndex,element){

    if(submitted) return;

    userAnswers[qIndex] = optIndex;

    const options = document.querySelectorAll(`[id^="q${qIndex}_opt"]`);

    options.forEach(opt=>{
        opt.classList.remove("selected");
    });

    element.classList.add("selected");

}

// ===============================
// MARK FOR REVIEW
// ===============================

function toggleMark(index,button){

    markedForReview[index] = !markedForReview[index];

    const questionBox = document.getElementById(`question_${index}`);

    if(markedForReview[index]){

        button.classList.add("marked");

        button.innerText = "Marked For Review";

        questionBox.classList.add("review-marked");

    }else{

        button.classList.remove("marked");

        button.innerText = "Mark For Review";

        questionBox.classList.remove("review-marked");

    }

}

// ===============================
// CLEAR ANSWER
// ===============================

function clearAnswer(index){

    if(submitted) return;

    userAnswers[index] = null;

    const options = document.querySelectorAll(`[id^="q${index}_opt"]`);

    options.forEach(opt=>{
        opt.classList.remove("selected");
    });

}

// ===============================
// SUBMIT QUIZ
// ===============================

function submitQuiz(){

    if(submitted) return;

    submitted = true;

    clearInterval(timer);

    let score = 0;

    let correctCount = 0;
    let wrongCount = 0;
    let unansweredCount = 0;

    questions.forEach((question,index)=>{

        const userAns = userAnswers[index];

        if(userAns === null){

            unansweredCount++;

        }
        else if(userAns === question.answer){

            score += 1;
            correctCount++;

        }
        else{

            score -= 0.25;
            wrongCount++;

        }

    });

    let attempted = correctCount + wrongCount;

    let accuracy = attempted > 0
    ? ((correctCount/attempted)*100).toFixed(2)
    : 0;

    document.body.innerHTML = `

    <div class="container">

        <div class="result-box">

            <h1>Quiz Submitted ✅</h1>

            <h2>Total Score: ${score.toFixed(2)}</h2>

            <h3>Correct Answers: ${correctCount}</h3>

            <h3>Wrong Answers: ${wrongCount}</h3>

            <h3>Unanswered Questions: ${unansweredCount}</h3>

            <h3>Accuracy: ${accuracy}%</h3>

            <button class="review-btn" onclick="reviewAnswers()">
            Review Answers
            </button>

            <div id="reviewSection"></div>

        </div>

    </div>

    `;

}

// ===============================
// REVIEW ANSWERS
// ===============================

function reviewAnswers(){

    const reviewSection = document.getElementById("reviewSection");

    let html = `<h1 style="margin-top:40px;">Review Section</h1>`;

    questions.forEach((question,index)=>{

        const userAns = userAnswers[index];

        let status = "";
        let marks = "";

        if(userAns === null){

            status = `<span class="unanswered">Unanswered</span>`;
            marks = `0 Marks`;

        }
        else if(userAns === question.answer){

            status = `<span class="correct">Correct ✅</span>`;
            marks = `+1 Mark`;

        }
        else{

            status = `<span class="wrong">Wrong ❌</span>`;
            marks = `-0.25 Mark`;

        }

        html += `

        <div class="review-question">

            <h3>Q${index+1}. ${question.q}</h3>

            <p>${status}</p>

            <p><b>Marks:</b> ${marks}</p>

            <p>
            <b>Your Answer:</b>
            ${
                userAns === null
                ? "Not Attempted"
                : question.options[userAns]
            }
            </p>

            <div class="correct-answer">
            <b>Correct Answer:</b>
            ${question.options[question.answer]}
            </div>

        </div>

        `;

    });

    reviewSection.innerHTML = html;

}

// ===============================
// TIMER
// ===============================

let time = 1800;

let timer;

let isPaused = false;

function startTimer(){

    timer = setInterval(()=>{

        if(!isPaused){

            let minutes = Math.floor(time/60);

            let seconds = time%60;

            document.getElementById("timer").innerText =
            `Time Left: ${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;

            time--;

            if(time < 0){

                clearInterval(timer);

                alert("Time is up! Quiz auto-submitted.");

                submitQuiz();

            }

        }

    },1000);

}

// ===============================
// PAUSE TIMER
// ===============================

function pauseTimer(){

    if(submitted) return;

    isPaused = true;

    document.getElementById("pauseBtn").disabled = true;

    document.getElementById("resumeBtn").disabled = false;

    // Disable options
    document.querySelectorAll(".option").forEach(opt=>{
        opt.classList.add("disabled-option");
    });

    // Disable buttons
    document.querySelectorAll(".mark-btn, .clear-btn").forEach(btn=>{
        btn.disabled = true;
        btn.classList.add("disabled-btn");
    });

}
// ===============================
// RESUME TIMER
// ===============================

function resumeTimer(){

    if(submitted) return;

    isPaused = false;

    document.getElementById("pauseBtn").disabled = false;

    document.getElementById("resumeBtn").disabled = true;

    // Enable options
    document.querySelectorAll(".option").forEach(opt=>{
        opt.classList.remove("disabled-option");
    });

    // Enable buttons
    document.querySelectorAll(".mark-btn, .clear-btn").forEach(btn=>{
        btn.disabled = false;
        btn.classList.remove("disabled-btn");
    });

}
// ===============================

loadQuiz();

startTimer();

</script>
